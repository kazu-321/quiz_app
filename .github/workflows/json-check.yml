name: JSON Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: json-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository JSON
        run: python3 tools/validate_repo_json.py
