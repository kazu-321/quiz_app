<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        const stored = localStorage.getItem("quiz_app_theme");
        const theme = stored === "dark" || stored === "light"
          ? stored
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (error) {
        /* ignore */
      }
    })();
  </script>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Quiz App - 解答</title>
  <script>
    (function () {
      const version = Date.now().toString(36);
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `css/style.css?v=${version}`;
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <header class="app-header compact">
    <div>
      <div class="header-copy">
        <p class="breadcrumb"><a href="index.html">問題集一覧</a></p>
        <h1 id="book-title">読み込み中...</h1>
        <p id="book-description"></p>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="secondary-button" type="button">ダークモード</button>
        <button id="hard-reload" class="secondary-button" type="button">強制更新</button>
      </div>
    </div>
  </header>

  <main id="app" class="page-shell">
    <div id="message" class="message" hidden></div>
    <section id="setup-view" class="quiz-panel" hidden>
      <h2>解く設定</h2>
      <div class="setup-grid">
        <label class="setup-option">
          <input id="setup-shuffle-questions" type="checkbox">
          <span>問題順をシャッフルする</span>
        </label>
        <label class="setup-option">
          <input id="setup-review-at-end" type="checkbox" checked>
          <span>答え合わせを最後に一気にする</span>
        </label>
        <label class="setup-option">
          <input id="setup-skip-answer-input" type="checkbox">
          <span>答え入力をスキップする</span>
        </label>
      </div>
      <div class="actions">
        <button id="start-quiz" type="button">解き始める</button>
        <button id="resume-quiz" class="secondary-button" type="button" hidden>続きから</button>
      </div>
      <p id="resume-info" class="muted"></p>
    </section>
    <section id="quiz-view" class="quiz-panel" hidden></section>
    <section id="summary-view" class="summary-panel" hidden></section>
  </main>

  <script>
    (function () {
      const version = Date.now().toString(36);
      for (const src of ["js/common.js", "js/markdown.js", "js/answer.js"]) {
        const script = document.createElement("script");
        script.src = `${src}?v=${version}`;
        script.async = false;
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
</html>
