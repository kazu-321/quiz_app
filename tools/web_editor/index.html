<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        const stored = localStorage.getItem("quiz_app_theme");
        const theme = stored === "dark" || stored === "light"
          ? stored
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (error) {
        /* ignore */
      }
    })();
  </script>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Quiz App Web Editor</title>
  <script>
    (function () {
      const version = Date.now().toString(36);
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `/tools/web_editor/style.css?v=${version}`;
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <header class="app-header compact">
    <div>
      <div class="header-copy">
        <h1>Quiz App Web Editor</h1>
        <p>ブラウザで問題集を編集して、保存は Python 側で行います。</p>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="secondary-button" type="button">ダークモード</button>
        <button id="hard-reload" class="secondary-button" type="button">強制更新</button>
      </div>
    </div>
  </header>

  <main class="page-shell editor-layout">
    <div id="message" class="message" hidden></div>

    <section id="screen-books" class="panel screen">
      <div class="section-head">
        <div>
          <h2>問題集一覧</h2>
          <p id="book-count" class="muted">読み込み中...</p>
        </div>
        <div class="stack">
          <button id="refresh-books" class="secondary-button" type="button">再読込</button>
          <button id="new-book" type="button">新規作成</button>
          <button id="regenerate-manifest" class="secondary-button" type="button">manifest 再生成</button>
        </div>
      </div>
      <div id="book-list" class="book-list" aria-live="polite"></div>
    </section>

    <section id="screen-book" class="workspace screen" hidden>
      <section class="panel">
        <div class="section-head">
          <div>
            <h2>問題集編集</h2>
            <p id="current-book-path" class="muted">未選択</p>
          </div>
          <div class="stack">
            <button id="back-to-books" class="secondary-button" type="button">戻る</button>
            <button id="save-book" type="button">保存</button>
            <button id="delete-book" class="danger-button" type="button">削除</button>
          </div>
        </div>

        <div class="form-grid book-form">
          <label>
            <span>内部ID</span>
            <input id="book-id" type="text" readonly>
          </label>
          <label>
            <span>タイトル</span>
            <input id="book-title" type="text">
          </label>
          <label>
            <span>フォルダ</span>
            <input id="book-folder" type="text" placeholder="例: 現代の社会I">
          </label>
          <label class="span-2">
            <span>説明</span>
            <input id="book-description" type="text">
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <h2>問題一覧</h2>
            <p id="question-count" class="muted">0 問</p>
          </div>
          <div class="stack">
            <button id="add-question" type="button">問題追加</button>
            <button id="edit-question" class="secondary-button" type="button">問題編集</button>
            <button id="delete-question" class="danger-button" type="button">問題削除</button>
          </div>
        </div>
        <div id="question-list" class="question-list" aria-live="polite"></div>
      </section>
    </section>

    <section id="screen-question" class="workspace screen" hidden>
      <section class="panel">
        <div class="section-head">
          <div>
            <h2>問題編集</h2>
            <p id="editing-question-label" class="muted">未選択</p>
          </div>
          <div class="stack">
            <button id="back-to-book" class="secondary-button" type="button">戻る</button>
            <button id="save-question" type="button">問題を保存</button>
            <button id="cancel-question" class="secondary-button" type="button">キャンセル</button>
          </div>
        </div>

        <div class="form-grid question-form">
          <label>
            <span>ID</span>
            <input id="question-id" type="text">
          </label>
          <label>
            <span>タイプ</span>
            <select id="question-type">
              <option value="single_choice">single_choice</option>
              <option value="multiple_choice">multiple_choice</option>
              <option value="ordered_choice">ordered_choice</option>
              <option value="text_input">text_input</option>
            </select>
          </label>
          <div class="span-2 question-markdown-layout">
            <label class="question-markdown-input">
              <span>問題文</span>
              <textarea id="question-text" rows="10"></textarea>
            </label>
            <div class="question-markdown-preview">
              <div class="section-head compact-head">
                <div>
                  <h3>プレビュー</h3>
                  <p class="muted">Markdown を右側で確認できます。</p>
                </div>
              </div>
              <div id="question-preview" class="markdown-body preview-body"></div>
            </div>
          </div>

          <section id="choice-section" class="span-2 section-box">
            <div class="section-head compact-head">
              <div>
                <h3>選択肢</h3>
                <p class="muted">1 行 1 件で入力します。</p>
              </div>
            </div>
            <textarea id="choices-text" rows="5"></textarea>
            <label>
              <span>回答</span>
              <input id="answer-entry" type="text">
            </label>
            <div id="shuffle-options" class="inline-options">
              <label><input id="shuffle-choices" type="checkbox"> 選択肢をシャッフル</label>
            </div>
            <p class="muted" id="choice-help"></p>
          </section>

          <section id="text-input-section" class="span-2 section-box">
            <div class="section-head compact-head">
              <div>
                <h3>穴埋め欄</h3>
                <p class="muted">各行に 1 つの入力欄を作ります。</p>
              </div>
              <button id="add-input-row" class="secondary-button" type="button">入力欄を追加</button>
            </div>
            <div id="input-rows" class="input-rows"></div>
            <div id="text-input-options" class="inline-options">
              <label><input id="input-ordered" type="checkbox" checked> 入力順を区別</label>
              <label><input id="case-sensitive" type="checkbox"> 大文字小文字を区別</label>
              <label><input id="trim-input" type="checkbox" checked> 前後空白を無視</label>
              <label><input id="normalize-spaces" type="checkbox" checked> 連続空白を 1 つに正規化</label>
            </div>
          </section>

          <label class="span-2">
            <span>解説</span>
            <textarea id="explanation-text" rows="4"></textarea>
          </label>
          <label>
            <span>タグ</span>
            <input id="tags-entry" type="text" placeholder="カンマ区切り">
          </label>
          <label>
            <span>難易度</span>
            <input id="difficulty-entry" type="text">
          </label>
          <p id="type-hint" class="muted span-2"></p>
        </div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      const version = Date.now().toString(36);
      for (const src of ["/js/common.js", "/js/markdown.js", "/tools/web_editor/app.js"]) {
        const script = document.createElement("script");
        script.src = `${src}?v=${version}`;
        script.async = false;
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
</html>
