<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        const stored = localStorage.getItem("quiz_app_theme");
        const theme = stored === "dark" || stored === "light"
          ? stored
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (error) {
        /* ignore */
      }
    })();
  </script>
  <title>Quiz App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <div class="header-copy">
        <h1>Quiz App</h1>
        <p>問題集を選んで学習を始めます。</p>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="secondary-button" type="button">ダークモード</button>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section class="toolbar">
      <div>
        <h2>問題集一覧</h2>
        <p id="book-count" class="muted">読み込み中...</p>
      </div>
      <button id="clear-storage" class="secondary-button" type="button">学習履歴を削除</button>
    </section>

    <div id="message" class="message" hidden></div>
    <section id="book-list" class="book-tree" aria-live="polite"></section>
    <section id="book-detail" class="summary-panel" hidden></section>
  </main>

  <script src="js/common.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
